version: 2

models:
  - name: stg_movies
    description: Clean movie-level TMDB records with release year and ROI.
    columns:
      - name: movie_id
        description: TMDB movie identifier.
        tests:
          - not_null
          - unique
      - name: title
        description: Movie title.
        tests:
          - not_null
      - name: release_year
        description: Year extracted from release_date.
        tests:
          - not_null
      - name: vote_average
        description: TMDB average vote score from 0 to 10.
      - name: budget
      - name: revenue
      - name: roi
        tests:
          - not_null

  - name: genre_decade_summary
    description: Movie analytics mart grouped by genre and release decade.
    columns:
      - name: genre_name
        tests:
          - not_null
      - name: decade
        tests:
          - not_null
      - name: total_films
